name: Build Convex Backend

on:
  workflow_dispatch:

jobs:
  build:
    name: Compile Rust Binary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Mengganti installer Nix menggunakan aksi resmi NixOS yang lebih stabil
      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      # Konfigurasi Devbox (tanpa harus bergantung pada installer Nix bawaan)
      - name: Install Devbox
        uses: jetify-com/devbox-install-action@v0.11.0
        with:
          enable-cache: true

      - name: Download Convex Source Code
        run: devbox run setup

      - name: Build Release Binary
        run: devbox run build:release

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: convex-local-backend-linux
          path: .convex-local/target/release/convex-local-backend
          retention-days: 7
