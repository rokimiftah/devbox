name: Build Convex Backend

on:
  workflow_dispatch:

jobs:
  build:
    name: Compile Rust Binary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Install Devbox (Headless)
        run: |
          curl -fsSL https://get.jetify.com/devbox -o install-devbox.sh
          chmod +x install-devbox.sh
          sudo ./install-devbox.sh -f
          sudo chown runner /usr/local/bin/devbox
          sudo chmod 755 /usr/local/bin/devbox

      - name: Setup Devbox Path
        run: echo "/usr/local/bin" >> $GITHUB_PATH

      - name: Download Convex Source Code
        run: devbox run setup

      - name: Build Release Binary
        run: devbox run build:release

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: convex-local-backend-linux
          path: .convex-local/target/release/convex-local-backend
          retention-days: 7
