name: Build Convex Backend

on:
  workflow_dispatch:

jobs:
  build:
    name: Compile Rust Binary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Menggunakan installer Nix dari Cachix yang terbukti stabil
      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      # Menginstal Devbox secara langsung (Bypass Github Action error)
      - name: Install Devbox (Manual)
        run: curl -fsSL https://get.jetpack.io/devbox | bash

      # Menambahkan Devbox ke dalam PATH agar bisa dipanggil di step selanjutnya
      - name: Setup Devbox Path
        run: echo "/usr/local/bin" >> $GITHUB_PATH

      - name: Download Convex Source Code
        run: devbox run setup

      - name: Build Release Binary
        run: devbox run build:release

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: convex-local-backend-linux
          path: .convex-local/target/release/convex-local-backend
          retention-days: 7
