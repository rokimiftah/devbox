name: Build Convex Backend

on:
  workflow_dispatch:

jobs:
  build:
    name: Compile Rust Binary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Pastikan Clang terpasang di Ubuntu dan temukan lokasinya
      - name: Install System Clang (for Bindgen)
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libclang-dev
          # Menemukan path libclang dan mengekspornya untuk semua step selanjutnya
          echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> $GITHUB_ENV

      # 2. Install Nix
      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      # 3. Install Devbox
      - name: Install Devbox (Headless)
        run: |
          curl -fsSL https://get.jetify.com/devbox -o install-devbox.sh
          chmod +x install-devbox.sh
          sudo ./install-devbox.sh -f
          sudo chown runner /usr/local/bin/devbox
          sudo chmod 755 /usr/local/bin/devbox

      # 4. Daftarkan Devbox Path
      - name: Setup Devbox Path
        run: echo "/usr/local/bin" >> $GITHUB_PATH

      # 5. Unduh Convex
      - name: Download Convex Source Code
        run: devbox run setup

      # 6. Kompilasi (Sekarang LIBCLANG_PATH akan dibaca otomatis oleh Cargo)
      - name: Build Release Binary
        run: devbox run build:release

      # 7. Upload Artifact
      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: convex-local-backend-linux
          path: .convex-local/target/release/convex-local-backend
          retention-days: 7
